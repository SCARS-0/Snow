services:

  postgres:
    image: postgres:16

    container_name: roster_postgres

    restart: always

    environment:
      POSTGRES_DB: roster_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build:
      context: ./backend

    container_name: roster_backend

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

volumes:
  postgres_data: